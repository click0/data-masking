name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      python-compat:
        description: 'Run additional tests on Python 3.9'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Syntax & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile data_masking.py
          python -m py_compile unmask_data.py
          python -m py_compile diagnose_mapping.py
          python -m py_compile rank_data.py
          python -m compileall modules/ tests/ -q

      - name: Install flake8
        run: pip install flake8

      - name: Flake8 — fatal errors (syntax, undefined names)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Flake8 — warnings (non-blocking)
        run: |
          flake8 . --count --max-line-length=150 --extend-ignore=E501,W503,W504 --statistics --exit-zero

  test:
    name: Tests (Python 3.13)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest --cov=. --cov-report=term --cov-report=xml:coverage.xml --timeout=300

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  test-compat:
    name: Tests (Python 3.9 — compat)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'workflow_dispatch' && inputs.python-compat == true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.9-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.9-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest --timeout=300
