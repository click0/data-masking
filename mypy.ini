[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
check_untyped_defs = False
disallow_untyped_defs = False
no_implicit_optional = True

# Strict for modules/ package
[mypy-modules.*]
check_untyped_defs = True

# Ignore test files
[mypy-tests.*]
ignore_errors = True
